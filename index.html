<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таро Мини-Приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #ffd700; font-size: 24px; }
        .description { font-size: 14px; margin-bottom: 20px; color: #ccc; }
        
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
        }

        .deck {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .card {
            width: 80px;
            height: 120px;
            background: #2a2a2a;
            border: 2px solid #ffd700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card.selected {
            background: #ffd700;
            transform: scale(1.05);
        }

        #send-btn {
            background: #ffd700;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            width: 90%;
        }
    </style>
</head>
<body>

    <h1>Гадание Таро</h1>
    <p class="description">Введите вопрос и выберите 3 карты</p>

    <input type="text" id="user-question" placeholder="Ваш вопрос (например, что меня ждет?)...">

    <div class="deck">
        <div class="card" onclick="selectCard(this, 'Маг')">🃏</div>
        <div class="card" onclick="selectCard(this, 'Жрица')">🃏</div>
        <div class="card" onclick="selectCard(this, 'Императрица')">🃏</div>
        <div class="card" onclick="selectCard(this, 'Шут')">🃏</div>
        <div class="card" onclick="selectCard(this, 'Сила')">🃏</div>
        <div class="card" onclick="selectCard(this, 'Колесо Фортуны')">🃏</div>
    </div>

    <button id="send-btn" onclick="sendData()">Узнать трактовку нейросети</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачивает приложение на весь экран

        let selectedCards = [];

        function selectCard(element, cardName) {
            if (selectedCards.includes(cardName)) {
                selectedCards = selectedCards.filter(c => c !== cardName);
                element.classList.remove('selected');
            } else {
                if (selectedCards.length < 3) {
                    selectedCards.push(cardName);
                    element.classList.add('selected');
                } else {
                    alert("Можно выбрать только 3 карты");
                }
            }
        }

        function sendData() {
            let question = document.getElementById('user-question').value;
            
            if (question.length < 5) {
                alert("Пожалуйста, введите вопрос");
                return;
            }
            if (selectedCards.length === 0) {
                alert("Выберите хотя бы одну карту");
                return;
            }

            let data = {
                question: question,
                cards: selectedCards
            };

            // Отправка данных в бота
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
